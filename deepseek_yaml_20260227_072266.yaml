matches:
  # Callback notes – ultra short triggers
  - trigger: ":cokay"
    replace: "All good. No concerns. Eating/drinking well, no issues."

  - trigger: ":cwalk"
    replace: "Walking well, bearing weight on limb, no obvious discomfort."

  - trigger: ":cvet"
    replace: "Client would like to speak with a vet. Please call back."

  - trigger: ":cpain"
    replace: "Patient appears to be in pain (whining, restless, guarding area). Vet attention needed."

  - trigger: ":csick"
    replace: "Still not well – [describe symptoms]. Vet follow‑up recommended."

  - trigger: ":ceat"
    replace: "Eating well, no vomiting or diarrhoea."

  - trigger: ":cneat"          # not eating
    replace: "Not eating well / off food. Monitor closely."

  - trigger: ":cvomit"
    replace: "Vomiting reported [frequency/details]. Vet advised."

  - trigger: ":cdia"
    replace: "Diarrhoea – [consistency/frequency]. Monitor hydration."

  - trigger: ":cincok"
    replace: "Incision clean, dry, no redness or discharge."

  - trigger: ":cincbad"
    replace: "Incision red/swollen/oozing. Vet check needed."

  - trigger: ":cmedok"
    replace: "Medication being given as directed, no issues."

  - trigger: ":cmedno"
    replace: "Difficulty giving medication – [reason]."

  - trigger: ":cappt"
    replace: "Appointment scheduled for [date/time]."

  - trigger: ":cmsg"
    replace: "Left message for client. No answer."

  - trigger: ":curg"
    replace: "URGENT – Client concerned. Please call ASAP."

  - trigger: ":cfu"
    replace: "Follow‑up needed in [days/weeks]."

  - trigger: ":creassure"
    replace: "Owner reassured. No further action needed."